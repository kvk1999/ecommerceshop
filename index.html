<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopSphere App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Sora", "ui-sans-serif", "system-ui", "sans-serif"] },
          colors: { night: "#070b1a" },
          boxShadow: {
            glass: "0 24px 80px rgba(8, 15, 38, 0.42)",
            neon: "0 0 45px rgba(56, 189, 248, 0.22), 0 0 80px rgba(139, 92, 246, 0.18)"
          },
          backgroundImage: {
            shell: "radial-gradient(circle at 15% 20%, rgba(56,189,248,0.18), transparent 26%), radial-gradient(circle at 85% 10%, rgba(139,92,246,0.18), transparent 30%), linear-gradient(145deg, #070b1a 10%, #0b1227 50%, #140d31 100%)"
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="min-h-screen bg-night bg-shell font-sans text-white antialiased">
  <div id="app"></div>
  <script src="./app.js"></script>
</body>
</html>
